# BACKGROUND
background {
    monitor =
    path = ~/.config/hypr/hyprlock.jpg
    blur_passes = 1
    blur_size = 1
    noise = 0
    contrast = 1
    brightness = 0.8172
    vibrancy = 0.9
    vibrancy_darkness = 0.0

    reload_cmd = 
    reload_time = 0
    crossfade_time = -1
    zindex = -1
}

# GENERAL
general {
    hide_cursor = false
    ignore_empty_input = true
    immediate_render = false
    text_trim = true
    fractional_scaling = 2
    screencopy_mode = 0
    fail_timeout = 2000
}

# AUTHENTICATION
auth {
    pam:enabled = true
    pam:module = hyprlock
    fingerprint:enabled = false
}

