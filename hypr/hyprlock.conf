# Hour-Time
label {
    monitor =
    text = cmd[update:1000] echo -e "<span font_weight='ultrabold'>$(date +"%I %M")</span>"
    color = rgba(255, 185, 0, 1)
    font_size = 150
    font_family = SF Pro Rounded Bold
    position = 0, 200
    halign = center
    valign = center
}

# Day-Date-Month
label {
    monitor =
    text = cmd[update:1000] echo "<span color='##ffffff'>$(date '+%A, ')</span><span color='##ffb900'>$(date '+%d %B %Y')</span>"
    font_size = 30
    font_family = SF Pro Rounded Bold
    position = 0, 50
    halign = center
    valign = center
}


# USER
label {
    monitor =
    text = Hello there!,  $USER
    color = rgba(216, 222, 233, 0.70)
    font_size = 16
    font_family = SF Pro Rounded Bold Italic
    position = 0, -200
    halign = center
    valign = center
}

# Profie-Photo
image {
    monitor =
    path = ~/.config/hypr/user.png
    border_color = 0xffdddddd
    border_size = 0
    size = 120
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, -120
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(100, 114, 125, 0.4)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = Google Sans Flex Bold
    placeholder_text = <i><span foreground="##ffffff99">󱅞  Locked</span></i>
    hide_input = false
    position = 0, -250
    halign = center
    valign = center
}

